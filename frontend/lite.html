<!DOCTYPE html>
<html lang="en" data-theme="purple">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self';">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaWave Lite</title>
    <link rel="icon" type="image/png" href="/src/assets/icon.png">
    <script src="/wails/ipc.js"></script>
    <script src="/wails/runtime.js"></script>
    <link rel="stylesheet" href="/src/lite_ui/lite.css">
</head>

<body>
    <!-- LOADING NOTIFICATION -->
    <div id="lite-loading-overlay" class="lite-loading-overlay hidden">
        <div class="lite-loader-content">
            <div class="lite-spinner"></div>
            <span id="lite-loading-text">Loading Library...</span>
        </div>
    </div>

    <!-- HEADER -->
    <header class="lite-header" style="--wails-draggable: drag;">
        <span class="lite-logo">⚡ NovaWave <span class="lite-badge">LITE</span></span>
        <div class="lite-header-actions">
            <button id="lite-switch-full-btn" data-lang-title="backToLegacy">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            </button>
        </div>
    </header>

    <!-- COVER ART -->
    <div class="lite-cover-wrap">
        <img id="lite-cover" src="" alt="" class="hidden">
        <div id="lite-cover-fallback" class="lite-cover-fallback">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 18V5l12-2v13"></path>
                <circle cx="6" cy="18" r="3"></circle>
                <circle cx="18" cy="16" r="3"></circle>
            </svg>
        </div>
    </div>

    <!-- TRACK INFO -->
    <div class="lite-info">
        <div class="lite-title-scroll">
            <span id="lite-title" data-lang-key="nothingPlaying">Not Loaded</span>
        </div>
        <div id="lite-artist" class="lite-artist">—</div>
    </div>

    <!-- PROGRESS BAR -->
    <div class="lite-progress-wrap">
        <span id="lite-time-current" class="lite-time">0:00</span>
        <div id="lite-progress-bar" class="lite-progress-bar">
            <div id="lite-progress-fill" class="lite-progress-fill"></div>
            <input type="range" id="lite-seek" class="lite-seek-input" min="0" max="100" value="0">
        </div>
        <span id="lite-time-total" class="lite-time">0:00</span>
    </div>

    <!-- CONTROLS -->
    <div class="lite-controls">
        <button id="lite-btn-shuffle" class="lite-ctrl-btn lite-mode-btn" data-lang-title="shuffle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line><line x1="4" y1="4" x2="9" y2="9"></line></svg>
        </button>

        <button id="lite-btn-prev" class="lite-ctrl-btn" data-lang-title="previous">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20"></polygon><line x1="5" y1="19" x2="5" y2="5"></line></svg>
        </button>

        <button id="lite-btn-play" class="lite-ctrl-btn lite-btn-main" data-lang-title="playPause">
            <svg id="lite-play-svg" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
            <svg id="lite-pause-svg" class="hidden" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
        </button>

        <button id="lite-btn-next" class="lite-ctrl-btn" data-lang-title="next">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></svg>
        </button>

        <button id="lite-btn-loop" class="lite-ctrl-btn lite-mode-btn" data-lang-title="loop">
            <svg id="lite-loop-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg>
            <span id="lite-loop-one-badge" class="lite-loop-badge hidden">1</span>
        </button>
    </div>

    <!-- MODE STATUS -->
    <div class="lite-mode-status">
        <span id="lite-shuffle-label" class="lite-mode-tag hidden">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line></svg>
            <span data-lang-key="shuffle">Shuffle</span>
        </span>
        <span id="lite-loop-label" class="lite-mode-tag hidden">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path></svg>
            <span data-lang-key="loop">Loop</span> <span id="lite-loop-type-text">All</span>
        </span>
    </div>


    <!-- VOLUME -->
    <div class="lite-volume-row">
        <span class="lite-vol-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon></svg>
        </span>
        <input type="range" id="lite-volume" class="lite-volume-slider" min="0" max="100" value="20">
        <span class="lite-vol-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon></svg>
        </span>
    </div>

    <!-- FOLDER ROW -->
    <div class="lite-folder-row">
        <div class="lite-folder-btns">
            <button id="lite-open-folder-btn" class="lite-action-btn" data-lang-title="loadFolder">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                <span data-lang-key="loadFolder">Load</span>
            </button>
            <button id="lite-refresh-folder-btn" class="lite-action-btn" data-lang-title="refreshFolder">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
                <span data-lang-key="refreshFolder">Refresh</span>
            </button>
        </div>
        <span id="lite-track-count" class="lite-track-count">— Tracks</span>
    </div>

    <!-- SEARCH -->
    <div class="lite-search-row">
        <div class="lite-search-container">
            <svg class="lite-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" id="lite-search-input" data-lang-placeholder="searchPlaceholder" placeholder="Search music..." class="lite-search-input">
        </div>
    </div>

    <!-- TRACK LIST -->
    <div id="lite-track-list" class="lite-track-list"></div>

    <!-- hidden audio -->
    <audio id="lite-audio" crossorigin="anonymous"></audio>

    <script type="module" src="/src/lite_ui/lite.js"></script>
</body>

</html>
